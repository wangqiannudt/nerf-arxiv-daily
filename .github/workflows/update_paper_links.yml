# This is a basic workflow to help you get started with Actions

name: Run Update Paper Links Weekly

permissions:
  contents: write

concurrency:
  group: arxiv-content-updates
  cancel-in-progress: false

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  schedule:
    - cron:  "0 8 * * 1"  #Run At 08:00 on Monday
  # Triggers the workflow on push or pull request events but only for the main branch
#   push:
#     branches:
#     - main

env:

  GITHUB_USER_NAME: AliTheFox86
  GITHUB_USER_EMAIL: wangqian@nudt.edu.cn
  
  
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    name: update
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        
      - name: Set up Python Env
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: pip
          #architecture: 'x64' # optional x64 or x86. Defaults to x64 if not specified
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run daily arxiv 
        run: |
          python nerf_daily_arxiv.py --update_paper_links
          
      - name: Commit and push updates
        run: |
          git config user.name "$GITHUB_USER_NAME"
          git config user.email "$GITHUB_USER_EMAIL"
          git add README.md nerf-arxiv-daily.json
          if git diff --cached --quiet; then
            echo "No paper link updates"
            exit 0
          fi
          git commit -m "Github Action Automatic Update NeRF Paper Links"
          git pull --rebase origin main
          git push origin HEAD:main
